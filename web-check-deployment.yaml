apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-check
  labels:
    app: web-check
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-check
  template:
    metadata:
      labels:
        app: web-check
    spec:
      containers:
      - name: web-check
        image: lissy93/web-check:latest
        ports:
        - containerPort: 3000
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
          requests:
            memory: "256Mi"
            cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: web-check-service
spec:
  selector:
    app: web-check
  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 30110  # Will be accessible on port 30110
    protocol: TCP
  type: NodePort
